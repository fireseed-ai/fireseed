# Example Kubernetes Secret for Fireseed.
#
# Fill in the values below and apply with:
#
#   kubectl apply -n fireseed-system -f secret.yaml
#
# Then install the chart with `existingSecret: fireseed-secrets` (or whatever
# you name it) in your values.
#
# For production, prefer External Secrets Operator or your cloud provider's
# secret store — see examples/externalsecret.yaml.

apiVersion: v1
kind: Secret
metadata:
  name: fireseed-secrets
  namespace: fireseed-system
type: Opaque
stringData:
  # PostgreSQL password for the bundled database user.
  # Generate: openssl rand -base64 24
  postgres-password: "CHANGE_ME"

  # AWS Bedrock API token (Claude access). Format: ABSK...
  # https://docs.aws.amazon.com/bedrock/latest/userguide/api-keys.html
  aws-bearer-token: "CHANGE_ME"

  # JWT signing key + HMAC for project tokens. ≥32 characters.
  # Generate: openssl rand -base64 48
  secret-key: "CHANGE_ME"

  # LiteLLM master key. Any opaque string starting with "sk-".
  # Generate: echo "sk-fireseed-$(openssl rand -hex 24)"
  litellm-key: "CHANGE_ME"

  # Internal service-to-service auth token.
  # Generate: openssl rand -base64 32
  service-token: "CHANGE_ME"

  # Bootstrap admin user (created on first install only).
  admin-email: "admin@example.com"
  admin-password: "CHANGE_ME"

  # Optional: enables the web_search tool for the AI agent.
  # Leave empty to disable.
  firecrawl-api-key: ""
