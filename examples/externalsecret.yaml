# Example ExternalSecret for Fireseed, using External Secrets Operator
# (https://external-secrets.io).
#
# Assumes a SecretStore named "aws-secretsmanager" already exists in the
# install namespace pointing at an AWS Secrets Manager entry called
# "fireseed/platform". The data keys in that entry must match the key names
# listed in values.yaml (postgres-password, aws-bearer-token, etc.).
#
# After apply, set `existingSecret: fireseed-secrets` in your chart values.

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: fireseed-secrets
  namespace: fireseed-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: SecretStore
  target:
    name: fireseed-secrets
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: fireseed/platform
