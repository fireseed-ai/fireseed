{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fireseed-platform
  namespace: {{ include "fireseed.namespace" . }}
  labels:
    {{- include "fireseed.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if or .Values.ingress.tls .Values.ingress.tlsHosts }}
  tls:
    - hosts:
        {{- range (.Values.ingress.tlsHosts | default (list .Values.baseDomain)) }}
        - {{ . }}
        {{- end }}
      {{- if .Values.ingress.tlsSecretName }}
      secretName: {{ .Values.ingress.tlsSecretName }}
      {{- end }}
  {{- end }}
  rules:
    - {{- if .Values.ingress.host }}
      host: {{ .Values.ingress.host }}
      {{- end }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: fireseed-api
                port:
                  number: {{ .Values.api.port }}
          - path: /app
            pathType: Prefix
            backend:
              service:
                name: fireseed-api
                port:
                  number: {{ .Values.api.port }}
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: fireseed-api
                port:
                  number: {{ .Values.api.port }}
          - path: /health
            pathType: Exact
            backend:
              service:
                name: fireseed-api
                port:
                  number: {{ .Values.api.port }}
          {{- if and .Values.litellm.database.enabled .Values.litellm.ui.pathPrefix }}
          # LiteLLM admin UI. SERVER_ROOT_PATH on the deployment makes
          # the proxy aware of this prefix so generated URLs resolve.
          - path: {{ .Values.litellm.ui.pathPrefix }}
            pathType: Prefix
            backend:
              service:
                name: fireseed-litellm
                port:
                  number: {{ .Values.litellm.port }}
          {{- end }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: fireseed-ui
                port:
                  number: {{ .Values.ui.port }}
{{- end }}
