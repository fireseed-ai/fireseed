{{- if .Values.litellm.database.enabled }}
# Idempotent provisioning of the LiteLLM database.
#
# LiteLLM uses the same postgres user + password as the rest of the
# platform — we just want a separate database so its Prisma-managed
# tables don't sit alongside fireseed-api's. The connecting user
# becomes the new database's owner and needs CREATEDB. The bundled
# `fireseed` superuser has it; RDS master users have it too.
#
# Runs as a pre-install / pre-upgrade hook so the database exists
# before the litellm pod's DATABASE_URL is dialled.
apiVersion: v1
kind: ConfigMap
metadata:
  name: fireseed-litellm-db-init
  namespace: {{ include "fireseed.namespace" . }}
  labels:
    app: fireseed-litellm
    {{- include "fireseed.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
data:
  init.sh: |
    #!/usr/bin/env sh
    set -eu
    echo "Waiting for postgres at $PG_HOST to accept connections…"
    for i in $(seq 1 60); do
      if psql -h "$PG_HOST" -U "$PG_USER" -d postgres -tAc "SELECT 1" >/dev/null 2>&1; then
        break
      fi
      sleep 2
    done

    LITELLM_DB="{{ include "fireseed.litellmDatabaseName" . }}"

    DB_EXISTS=$(psql -h "$PG_HOST" -U "$PG_USER" -d postgres -tAc \
      "SELECT 1 FROM pg_database WHERE datname='$LITELLM_DB'" || true)
    if [ "$DB_EXISTS" != "1" ]; then
      echo "Creating database '$LITELLM_DB' owned by '$PG_USER'…"
      psql -v ON_ERROR_STOP=1 -h "$PG_HOST" -U "$PG_USER" -d postgres \
        -c "CREATE DATABASE \"$LITELLM_DB\""
    fi

    echo "Done."
---
apiVersion: batch/v1
kind: Job
metadata:
  name: fireseed-litellm-db-init
  namespace: {{ include "fireseed.namespace" . }}
  labels:
    app: fireseed-litellm
    {{- include "fireseed.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-4"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 5
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: fireseed-litellm-db-init
    spec:
      {{- include "fireseed.podPlacement" . | nindent 6 }}
{{- include "fireseed.imagePullSecrets" . }}
      restartPolicy: OnFailure
      containers:
        - name: init
          image: postgres:16
          command: ["/bin/sh", "/scripts/init.sh"]
          env:
            - name: PG_HOST
              value: {{ include "fireseed.postgresHost" . | quote }}
            - name: PG_USER
              value: {{ include "fireseed.postgresUser" . | quote }}
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "fireseed.secretName" $ }}
                  key: postgres-password
            - name: PGCONNECT_TIMEOUT
              value: "10"
          volumeMounts:
            - name: scripts
              mountPath: /scripts
      volumes:
        - name: scripts
          configMap:
            name: fireseed-litellm-db-init
            defaultMode: 0755
{{- end }}
