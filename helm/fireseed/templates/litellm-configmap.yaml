apiVersion: v1
kind: ConfigMap
metadata:
  name: fireseed-litellm-config
  namespace: {{ include "fireseed.namespace" . }}
  labels:
    app: fireseed-litellm
    {{- include "fireseed.labels" . | nindent 4 }}
data:
  config.yaml: |
    # All models live in LiteLLM_ProxyModelTable (DB-backed), not
    # this configmap. Admins manage them via the LiteLLM admin UI
    # (linked from fireseed Settings → Manage models, signed in via
    # the SSO passport at /api/admin/litellm-passport). The proxy
    # persists each added row encrypted with LITELLM_SALT_KEY.
    #
    # Fresh-cluster install note: a brand-new cluster ships with
    # ``model_list: []`` and needs at least one model added once
    # via the LiteLLM admin UI before fireseed can serve a chat.
    model_list: []
    general_settings:
      master_key: os.environ/LITELLM_MASTER_KEY
      {{- if .Values.litellm.database.enabled }}
      database_url: os.environ/DATABASE_URL
      # Required for the fireseed admin Models page (Settings →
      # Models): /model/new persists added rows into
      # LiteLLM_ProxyModelTable (encrypted with LITELLM_SALT_KEY)
      # and merges them with the configmap-defined list at runtime.
      # Belt-and-braces with the STORE_MODEL_IN_DB env on the
      # litellm-deployment — keep both aligned. On rollback to a
      # chart that drops the env, the runtime defers to this
      # config-file value, so the platform stays in sync.
      store_model_in_db: true
      database_connection_pool_limit: {{ .Values.litellm.database.connectionPoolLimit | default 10 }}
      database_connection_timeout: 60
      {{- end }}
    litellm_settings:
      # Best-effort param compatibility: when an admin-configured
      # provider doesn't accept one of the standard SDK params (e.g.
      # ``reasoning_effort`` on a non-reasoning model), the proxy
      # silently drops it instead of 400ing. This is what lets the
      # platform talk to mixed providers without hardcoded gating
      # in the agent. Caveats:
      #   * Only the *standard* SDK param surface is dropped. Keys
      #     under ``extra_body`` (``thinking``, ``betas`` etc) are
      #     forwarded raw — providers that reject them still 400.
      #   * The agent never sees the drop happen — it has to assume
      #     "I asked for X, the model may or may not honour it".
      # See _completion_extras() in ai_agent.py for the gating that
      # complements this; new params should test on a non-reasoning
      # model before being assumed safe.
      drop_params: true
      # Provider-agnostic fallback chains. The keys are the
      # caller's logical alias; the values are alternates the proxy
      # tries on RateLimitError / 5xx / context-overflow before
      # giving up. Empty by default — admins populate via
      # `.Values.litellm.fallbacks` once they've added a second
      # model row that's interchangeable with the first. Example:
      #   fallbacks:
      #     - "claude-opus-4-7": ["claude-sonnet-4-6", "gpt-5.3-codex"]
      # The agent doesn't pick the alternate; LiteLLM transparently
      # retries and the chat continues. No code knows model names.
      {{- with .Values.litellm.fallbacks }}
      fallbacks: {{ toJson . }}
      {{- end }}
      {{- with .Values.litellm.contextWindowFallbacks }}
      context_window_fallbacks: {{ toJson . }}
      {{- end }}
      {{- with .Values.litellm.contentPolicyFallbacks }}
      content_policy_fallbacks: {{ toJson . }}
      {{- end }}
