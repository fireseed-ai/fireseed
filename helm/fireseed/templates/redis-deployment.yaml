apiVersion: apps/v1
kind: Deployment
metadata:
  name: fireseed-redis
  namespace: {{ include "fireseed.namespace" . }}
  labels:
    app: fireseed-redis
    {{- include "fireseed.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fireseed-redis
  template:
    metadata:
      labels:
        app: fireseed-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
