apiVersion: v1
kind: Service
metadata:
  name: fireseed-redis
  namespace: {{ include "fireseed.namespace" . }}
  labels:
    app: fireseed-redis
    {{- include "fireseed.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: 6379
  selector:
    app: fireseed-redis
