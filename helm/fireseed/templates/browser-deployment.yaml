apiVersion: apps/v1
kind: Deployment
metadata:
  name: fireseed-browser
  namespace: {{ include "fireseed.namespace" . }}
  labels:
    app: fireseed-browser
    {{- include "fireseed.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.browser.replicas | default 1 }}
  {{- with .Values.browser.strategy }}
  strategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      app: fireseed-browser
  template:
    metadata:
      labels:
        app: fireseed-browser
    spec:
{{- include "fireseed.imagePullSecrets" . }}
      {{- include "fireseed.podPlacement" . | nindent 6 }}
      containers:
        - name: browser
          image: {{ include "fireseed.image" (dict "global" .Values.global "name" "fireseed-browser" "chart" .Chart) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy | default "IfNotPresent" }}
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          ports:
            - containerPort: {{ .Values.browser.port }}
          {{- with .Values.browser.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.browser.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.browser.port }}
            initialDelaySeconds: 10
            periodSeconds: 15
