apiVersion: apps/v1
kind: Deployment
metadata:
  name: fireseed-api
  namespace: {{ include "fireseed.namespace" . }}
  labels:
    app: fireseed-api
    {{- include "fireseed.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicas }}
  # Recreate — kill the old pod before starting the new one. At
  # replicas=1 the default RollingUpdate + readinessProbe combo
  # leaves a stuck rollout if a new image fails to become Ready:
  # the failed pod occupies the surge slot and subsequent helm
  # upgrades can't advance. Recreate is the simpler, self-healing
  # strategy for a single-replica control-plane pod.
  strategy:
    type: Recreate
    rollingUpdate: null
  selector:
    matchLabels:
      app: fireseed-api
  template:
    metadata:
      labels:
        app: fireseed-api
    spec:
{{- include "fireseed.imagePullSecrets" . }}
      serviceAccountName: fireseed-api
      {{- include "fireseed.podPlacement" . | nindent 6 }}
      containers:
        - name: api
          image: {{ include "fireseed.image" (dict "global" .Values.global "name" "fireseed-api" "chart" .Chart) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy | default "IfNotPresent" }}
          ports:
            - containerPort: {{ .Values.api.port }}
          envFrom:
            - configMapRef:
                name: fireseed-api-config
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "fireseed.secretName" $ }}
                  key: postgres-password
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "fireseed.secretName" $ }}
                  key: secret-key
            - name: REDIS_URL
              value: "redis://fireseed-redis:6379/0"
            - name: FIRECRAWL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "fireseed.secretName" $ }}
                  key: firecrawl-api-key
                  optional: true
            - name: LITELLM_URL
              value: "http://fireseed-litellm:4000"
            - name: LITELLM_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "fireseed.secretName" $ }}
                  key: litellm-key
            - name: SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "fireseed.secretName" $ }}
                  key: service-token
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "fireseed.secretName" $ }}
                  key: admin-password
            - name: APP_NAMESPACE
              value: {{ .Values.appNamespace | default "fireseed-apps" | quote }}
            - name: SQUID_DEFAULT_HOSTS_JSON
              value: {{ .Values.squid.defaultHosts | toJson | quote }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.api.port }}
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.api.port }}
            initialDelaySeconds: 15
            periodSeconds: 10
          {{- with .Values.api.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
