apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: fireseed-postgres
  namespace: {{ include "fireseed.namespace" . }}
  labels:
    app: fireseed-postgres
    {{- include "fireseed.labels" . | nindent 4 }}
spec:
  serviceName: fireseed-postgres
  replicas: 1
  selector:
    matchLabels:
      app: fireseed-postgres
  template:
    metadata:
      labels:
        app: fireseed-postgres
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgres.image }}
          ports:
            - containerPort: {{ .Values.postgres.port }}
          env:
            - name: POSTGRES_USER
              value: {{ .Values.postgres.user | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "fireseed.secretName" $ }}
                  key: postgres-password
            - name: POSTGRES_DB
              value: {{ .Values.postgres.database | quote }}
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "{{ .Values.postgres.user }}"]
            initialDelaySeconds: 5
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.postgres.storage }}
