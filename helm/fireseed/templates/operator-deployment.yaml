apiVersion: apps/v1
kind: Deployment
metadata:
  name: fireseed-operator
  namespace: {{ include "fireseed.namespace" . }}
  labels:
    app: fireseed-operator
    {{- include "fireseed.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.operator.replicas }}
  selector:
    matchLabels:
      app: fireseed-operator
  template:
    metadata:
      labels:
        app: fireseed-operator
    spec:
{{- include "fireseed.imagePullSecrets" . }}
      serviceAccountName: fireseed-operator
      containers:
        - name: operator
          image: {{ include "fireseed.image" (dict "global" .Values.global "name" "fireseed-operator" "chart" .Chart) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy | default "IfNotPresent" }}
          env:
            - name: FIRESEED_API_URL
              value: "http://fireseed-api:{{ .Values.api.port }}"
            - name: BASE_DOMAIN
              value: {{ .Values.baseDomain | quote }}
            - name: IMAGE_PULL_POLICY
              value: {{ .Values.global.imagePullPolicy | default "IfNotPresent" | quote }}
            - name: IMAGE_BASE_PYTHON
              value: {{ include "fireseed.image" (dict "global" .Values.global "name" "fireseed-base-python" "chart" .Chart) | quote }}
            - name: IMAGE_BASE_NODE
              value: {{ include "fireseed.image" (dict "global" .Values.global "name" "fireseed-base-node" "chart" .Chart) | quote }}
            - name: IMAGE_FILE_SYNC
              value: {{ include "fireseed.image" (dict "global" .Values.global "name" "fireseed-file-sync" "chart" .Chart) | quote }}
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "fireseed.secretName" $ }}
                  key: secret-key
            - name: SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "fireseed.secretName" $ }}
                  key: service-token
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "fireseed.secretName" $ }}
                  key: postgres-password
            - name: POSTGRES_USER
              value: {{ .Values.postgres.user | quote }}
            - name: POSTGRES_DB
              value: {{ .Values.postgres.database | quote }}
          {{- with .Values.operator.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
