apiVersion: v1
kind: ConfigMap
metadata:
  name: fireseed-squid-config
  namespace: {{ include "fireseed.namespace" . }}
  labels:
    app: fireseed-squid
    {{- include "fireseed.labels" . | nindent 4 }}
data:
  squid.conf: |
    acl fireseed_allowed dstdomain "/etc/squid/allowed_hosts.txt"
    acl SSL_ports port 443
    acl Safe_ports port 80
    acl Safe_ports port 443
    acl CONNECT method CONNECT
    # Defense-in-depth: block IP-literal URLs and destinations that
    # resolve into private / link-local / loopback ranges. Catches
    # DNS-rebinding attacks against allowlisted domains and any
    # future allowlist drift that permits IP URLs.
    acl ip_literal_url dstdom_regex -i ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$
    acl localnet dst 10.0.0.0/8
    acl localnet dst 172.16.0.0/12
    acl localnet dst 192.168.0.0/16
    acl localnet dst 169.254.0.0/16
    acl localnet dst 127.0.0.0/8
    acl localnet dst ::1/128
    http_access deny ip_literal_url
    http_access deny localnet
    http_access allow CONNECT fireseed_allowed SSL_ports
    http_access allow fireseed_allowed Safe_ports
    http_access deny all
    http_port 3128
    cache deny all
    access_log /var/log/squid/access.log
    cache_log /var/log/squid/cache.log
    httpd_suppress_version_string on
    connect_timeout 30 seconds
    read_timeout 300 seconds
    forwarded_for delete
  allowed_hosts.txt: |
    pypi.org
    files.pythonhosted.org
    registry.npmjs.org
    cdn.jsdelivr.net
