apiVersion: v1
kind: ServiceAccount
metadata:
  name: fireseed-operator
  namespace: {{ include "fireseed.namespace" . }}
  labels:
    {{- include "fireseed.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: fireseed-operator
  labels:
    {{- include "fireseed.labels" . | nindent 4 }}
rules:
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: ["fireseed.internal"]
    resources: ["fireseedapps", "fireseedapps/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["namespaces", "pods", "services", "configmaps", "secrets", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch", "create", "patch"]
  - apiGroups: [""]
    resources: ["pods/log", "pods/exec"]
    verbs: ["get", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: fireseed-operator
  labels:
    {{- include "fireseed.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: fireseed-operator
    namespace: {{ include "fireseed.namespace" . }}
roleRef:
  kind: ClusterRole
  name: fireseed-operator
  apiGroup: rbac.authorization.k8s.io
