apiVersion: v1
kind: ConfigMap
metadata:
  name: fireseed-api-config
  namespace: {{ include "fireseed.namespace" . }}
  labels:
    app: fireseed-api
    {{- include "fireseed.labels" . | nindent 4 }}
data:
  POSTGRES_HOST: {{ include "fireseed.postgresHost" . | quote }}
  POSTGRES_PORT: {{ include "fireseed.postgresPort" . | quote }}
  POSTGRES_USER: {{ include "fireseed.postgresUser" . | quote }}
  POSTGRES_DB: {{ include "fireseed.postgresDatabase" . | quote }}
  BASE_DOMAIN: {{ .Values.baseDomain | quote }}
