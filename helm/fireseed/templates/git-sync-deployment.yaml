{{- if (default (dict) .Values.gitSync).enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fireseed-git-sync
  namespace: {{ include "fireseed.namespace" . }}
  labels:
    app: fireseed-git-sync
    {{- include "fireseed.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    # The pod owns the single working clone + is the sole writer for
    # the mirrored branch. Recreate (not RollingUpdate) avoids two pods
    # briefly pushing concurrently during upgrades.
    type: Recreate
  selector:
    matchLabels:
      app: fireseed-git-sync
  template:
    metadata:
      labels:
        app: fireseed-git-sync
    spec:
{{- include "fireseed.imagePullSecrets" . }}
      containers:
        - name: git-sync
          image: {{ include "fireseed.image" (dict "global" .Values.global "name" "fireseed-git-sync" "chart" .Chart) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy | default "IfNotPresent" }}
          ports:
            - containerPort: 8080
          # All git config (repo URL, branch, credentials, author) lives
          # in the platform DB and is fetched from /api/internal/git-sync/config.
          # Configure it from the admin UI under "Git Sync".
          envFrom:
            # Same ConfigMap the API consumes — it carries POSTGRES_HOST/
            # PORT/USER/DB resolved through the chart's external-vs-bundled
            # helpers. Sharing it means a downstream override (e.g. an
            # admission webhook injecting an RDS endpoint into the API)
            # automatically applies to git-sync's LISTEN connection too.
            # Without this, git-sync hardcoded fireseed-postgres and DNS
            # failed on clusters that point the API at an external DB.
            - configMapRef:
                name: fireseed-api-config
          env:
            - name: FIRESEED_API_URL
              value: "http://fireseed-api:{{ .Values.api.port }}"
            - name: REDIS_URL
              value: "redis://fireseed-redis:6379/0"
            - name: SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "fireseed.secretName" $ }}
                  key: service-token
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "fireseed.secretName" $ }}
                  key: postgres-password
            - name: PLATFORM_DATABASE_URL
              # $(VAR) substitution pulls POSTGRES_HOST/USER/PORT/DB from
              # the envFrom-imported ConfigMap above and POSTGRES_PASSWORD
              # from the secret. k8s resolves these at container start.
              value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@$(POSTGRES_HOST):$(POSTGRES_PORT)/$(POSTGRES_DB)"
          readinessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 30
            periodSeconds: 15
          volumeMounts:
            - name: worktree
              mountPath: /var/lib/git-sync
          {{- with .Values.gitSync.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: worktree
          emptyDir: {}
{{- end }}
