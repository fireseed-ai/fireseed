apiVersion: v1
kind: Service
metadata:
  name: fireseed-squid
  namespace: {{ include "fireseed.namespace" . }}
  labels:
    app: fireseed-squid
    {{- include "fireseed.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 3128
      targetPort: 3128
  selector:
    app: fireseed-squid
