apiVersion: apps/v1
kind: Deployment
metadata:
  name: fireseed-litellm
  namespace: {{ include "fireseed.namespace" . }}
  labels:
    app: fireseed-litellm
    {{- include "fireseed.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fireseed-litellm
  template:
    metadata:
      labels:
        app: fireseed-litellm
    spec:
{{- include "fireseed.imagePullSecrets" . }}
      {{- include "fireseed.podPlacement" . | nindent 6 }}
      containers:
        - name: litellm
          # Default to BerriAI's official upstream image. We don't
          # rebuild + republish a fork — the previous services/litellm
          # Dockerfile only added EXPOSE + CMD on top, so re-pushing
          # the 295 MB base layer to Docker Hub gained us nothing and
          # routinely 400'd the registry's blob-upload session.
          # Pin a versioned-stable tag (per BerriAI's post-incident
          # advisory) instead of a rolling 'main-stable' alias.
          image: {{ .Values.litellm.image | default "ghcr.io/berriai/litellm-database:v1.83.10-stable" }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy | default "IfNotPresent" }}
          ports:
            - containerPort: 4000
          env:
            # No AWS_BEARER_TOKEN_BEDROCK env: the bearer lives in
            # LiteLLM_ProxyModelTable encrypted with LITELLM_SALT_KEY,
            # written by an admin via the LiteLLM admin UI (linked
            # from fireseed Settings → Manage models). Rotatable
            # from there without a redeploy.
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "fireseed.secretName" $ }}
                  key: litellm-key
            # Trust X-Forwarded-Proto from the Tailscale / nginx ingress
            # so uvicorn issues redirects on the original https scheme.
            # Without this, LiteLLM 307s to http://… and the browser
            # refuses the downgrade with ERR_CONNECTION_REFUSED.
            - name: FORWARDED_ALLOW_IPS
              value: "*"
            # /update/ui_settings persists to a DB-backed config table,
            # gated by this flag. The configmap also sets it, but
            # LiteLLM checks the env var as the primary source — the
            # in-config value isn't always promoted to the runtime
            # global.
            - name: STORE_MODEL_IN_DB
              value: "True"
            # When the proxy auto-bridges OpenAI reasoning models from
            # /chat/completions to /v1/responses (gpt-5.x, o-series,
            # codex), this flag tells the bridge to request a
            # reasoning summary and surface it back as
            # `delta.reasoning_content` on the chat-completions stream
            # — the same field Anthropic's extended thinking already
            # populates. The platform agent reads `reasoning_content`
            # uniformly, so the Thoughts pill lights up for any model
            # that supports reasoning, no UI changes needed.
            - name: LITELLM_REASONING_AUTO_SUMMARY
              value: "true"
            {{- if .Values.litellm.database.enabled }}
            - name: LITELLM_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "fireseed.secretName" $ }}
                  key: postgres-password
            - name: DATABASE_URL
              value: "postgresql://{{ include "fireseed.postgresUser" . }}:$(LITELLM_DB_PASSWORD)@{{ include "fireseed.postgresHost" . }}:{{ include "fireseed.postgresPort" . }}/{{ include "fireseed.litellmDatabaseName" . }}"
            - name: LITELLM_SALT_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "fireseed.secretName" $ }}
                  key: litellm-salt-key
            {{- if .Values.litellm.ui.pathPrefix }}
            # Tells FastAPI/uvicorn that incoming requests carry this
            # path prefix, so links rendered in the LiteLLM UI and the
            # OpenAPI spec base path resolve correctly behind the
            # platform ingress at /litellm/*.
            - name: SERVER_ROOT_PATH
              value: {{ .Values.litellm.ui.pathPrefix | quote }}
            {{- end }}
            {{- if .Values.litellm.ui.requireBasicAuth }}
            - name: UI_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "fireseed.secretName" $ }}
                  key: litellm-ui-username
            - name: UI_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "fireseed.secretName" $ }}
                  key: litellm-ui-password
            {{- end }}
            {{- end }}
            # OPENAI_API_KEY / GEMINI_API_KEY / ANTHROPIC_API_KEY etc
            # are not wired here — admins enter them via the LiteLLM
            # admin UI (Models tab) when adding a provider. With
            # store_model_in_db=True the proxy persists both the
            # model row and the api_key into LiteLLM_ProxyModelTable
            # encrypted with LITELLM_SALT_KEY. A fresh cluster ships
            # with no models and the admin adds the first one via
            # the LiteLLM UI.
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
          # /health/liveliness and /health/readiness on LiteLLM require
          # master-key auth; use a plain TCP probe instead so the probe
          # doesn't have to carry the secret.
          # `database.enabled` boots Prisma's auto-migration on first
          # start which can take 60-90s. Use a startupProbe to absorb
          # that without false-positive liveness restarts.
          startupProbe:
            tcpSocket:
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 60
          readinessProbe:
            tcpSocket:
              port: 4000
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 4000
            periodSeconds: 15
          {{- with .Values.litellm.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: config
          configMap:
            name: fireseed-litellm-config
