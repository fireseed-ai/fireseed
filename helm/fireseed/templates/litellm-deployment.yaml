apiVersion: apps/v1
kind: Deployment
metadata:
  name: fireseed-litellm
  namespace: {{ include "fireseed.namespace" . }}
  labels:
    app: fireseed-litellm
    {{- include "fireseed.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fireseed-litellm
  template:
    metadata:
      labels:
        app: fireseed-litellm
    spec:
{{- include "fireseed.imagePullSecrets" . }}
      containers:
        - name: litellm
          image: {{ include "fireseed.image" (dict "global" .Values.global "name" "fireseed-litellm" "chart" .Chart) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy | default "IfNotPresent" }}
          ports:
            - containerPort: 4000
          env:
            - name: AWS_BEARER_TOKEN_BEDROCK
              valueFrom:
                secretKeyRef:
                  name: {{ include "fireseed.secretName" $ }}
                  key: aws-bearer-token
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "fireseed.secretName" $ }}
                  key: litellm-key
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
          # /health/liveliness and /health/readiness on LiteLLM require
          # master-key auth; use a plain TCP probe instead so the probe
          # doesn't have to carry the secret.
          readinessProbe:
            tcpSocket:
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 4000
            initialDelaySeconds: 20
            periodSeconds: 15
          {{- with .Values.litellm.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: config
          configMap:
            name: fireseed-litellm-config
