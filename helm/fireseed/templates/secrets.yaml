{{- if not .Values.existingSecret }}
{{- $ns := include "fireseed.namespace" . }}
{{- $existing := lookup "v1" "Secret" $ns "fireseed-secrets" }}
{{- $existingData := ($existing.data | default dict) }}

{{/* Auto-generate secret-key on first install, reuse on upgrades */}}
{{- $secretKey := .Values.secretKey }}
{{- if not $secretKey }}
  {{- $secretKey = get $existingData "secret-key" | b64dec | default (randAlphaNum 64) }}
{{- end }}

{{/* Auto-generate postgres password on first install */}}
{{- $pgPass := .Values.postgres.password }}
{{- if eq $pgPass "fireseed" }}
  {{- $pgPass = get $existingData "postgres-password" | b64dec | default (randAlphaNum 32) }}
{{- end }}

{{/* Preserve AWS token across upgrades — only override if explicitly set */}}
{{- $awsToken := .Values.awsBearerToken }}
{{- if not $awsToken }}
  {{- $awsToken = get $existingData "aws-bearer-token" | b64dec | default "" }}
{{- end }}

{{/* Preserve litellm key */}}
{{- $litellmKey := .Values.litellmKey }}
{{- if not $litellmKey }}
  {{- $litellmKey = get $existingData "litellm-key" | b64dec | default "sk-fireseed-master-key" }}
{{- end }}

{{/* Auto-generate service token for internal K8s auth */}}
{{- $serviceToken := .Values.serviceToken | default (get $existingData "service-token" | b64dec | default (randAlphaNum 64)) }}

apiVersion: v1
kind: Secret
metadata:
  name: fireseed-secrets
  namespace: {{ $ns }}
  labels:
    {{- include "fireseed.labels" . | nindent 4 }}
type: Opaque
stringData:
  postgres-password: {{ $pgPass | quote }}
  aws-bearer-token: {{ $awsToken | quote }}
  secret-key: {{ $secretKey | quote }}
  litellm-key: {{ $litellmKey | quote }}
  admin-email: {{ .Values.adminEmail | default "" | quote }}
  admin-password: {{ .Values.adminPassword | default "" | quote }}
  service-token: {{ $serviceToken | quote }}
  firecrawl-api-key: {{ .Values.firecrawlApiKey | default "" | quote }}
{{- end }}
