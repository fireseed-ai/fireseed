apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: fireseedapps.fireseed.internal
  labels:
    app.kubernetes.io/managed-by: helm
    app.kubernetes.io/part-of: fireseed
spec:
  group: fireseed.internal
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                projectId:
                  type: string
                version:
                  type: integer
                subdomain:
                  type: string
                fireseedApiUrl:
                  type: string
                mode:
                  type: string
                  enum: ["dev", "production"]
                database:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                exposures:
                  type: array
                  items:
                    type: object
                    properties:
                      ingressClassName:
                        type: string
                      hostname:
                        type: string
                      domain:
                        type: string
                      tlsSecretName:
                        type: string
            status:
              type: object
              properties:
                state:
                  type: string
                url:
                  type: string
                message:
                  type: string
      subresources:
        status: {}
  scope: Namespaced
  names:
    plural: fireseedapps
    singular: fireseedapp
    kind: FireseedApp
