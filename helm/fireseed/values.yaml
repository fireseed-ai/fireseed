namespace: fireseed-system

# Base domain for the platform and app subdomains
# Platform: local.fireseed.dev, Apps: {subdomain}.local.fireseed.dev
baseDomain: local.fireseed.dev

# Container registry — override for production
global:
  registry: docker.io/fireseeddev
  imagePullPolicy: IfNotPresent
  tag: latest
  imagePullSecrets: []

postgres:
  image: postgres:16
  user: fireseed
  password: fireseed  # CHANGE IN PRODUCTION
  database: fireseed
  storage: 5Gi
  port: 5432
  backup:
    enabled: true

api:
  replicas: 1
  port: 8000
  env:
    POSTGRES_HOST: fireseed-postgres
    POSTGRES_PORT: "5432"
    POSTGRES_USER: fireseed
    POSTGRES_PASSWORD: fireseed
    POSTGRES_DB: fireseed

ui:
  replicas: 1
  port: 3000

operator:
  replicas: 1

litellm:
  replicas: 1
  port: 4000

browser:
  replicas: 2
  port: 9222

squid:
  replicas: 1
  port: 3128

ingress:
  enabled: true
  className: traefik
  host: local.fireseed.dev  # Leave empty for hostless ingress (e.g. Tailscale)
  tls: true
  tlsSecretName: fireseed-wildcard-tls
  annotations: {}

# Set to use a pre-existing secret (e.g. from External Secrets Operator)
# When set, the chart skips creating its own secret and uses this one instead.
# The secret must contain keys: postgres-password, aws-bearer-token, secret-key,
#   litellm-key, service-token, admin-email, admin-password
existingSecret: ""

awsBearerToken: ""
secretKey: ""  # Auto-generated on first install if empty
litellmKey: "sk-fireseed-master-key"  # CHANGE IN PRODUCTION
adminEmail: ""  # First admin user email (set for first install)
adminPassword: ""  # First admin user password (set for first install)
firecrawlApiKey: ""  # Optional — enables web_search tool for the AI agent
