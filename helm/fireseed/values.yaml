# Install namespace. If unset, the release namespace (helm -n <ns>) is used.
namespace: ""

# Base domain for the platform. Apps provisioned through the operator get a
# {subdomain}.{baseDomain} URL via the platform ingress.
baseDomain: ""

# ─────────────────────────────────────────────────────────────
# Secrets
# ─────────────────────────────────────────────────────────────
# The chart does NOT create or manage a Secret for you — that keeps sensitive
# values out of your values.yaml and your git history. Create a Secret in the
# install namespace with the keys below and set existingSecret to its name.
#
# Required keys:
#   postgres-password  — password for the bundled PostgreSQL user
#   secret-key         — JWT signing key (≥32 chars) + project-token HMAC
#   litellm-key        — LiteLLM master key (sk-…)
#   service-token      — internal service-to-service auth token
#   admin-password     — bootstrap admin user password (user is admin@internal)
#   litellm-db-password — password for the LiteLLM postgres role
#   litellm-salt-key    — used by LiteLLM to encrypt stored creds
#
# Optional keys:
#   firecrawl-api-key  — enables web_search tool
#   litellm-ui-username — required when .Values.litellm.ui.requireBasicAuth
#   litellm-ui-password — required when .Values.litellm.ui.requireBasicAuth
#
# Provider API keys (Bedrock bearer, OpenAI key, Anthropic key,
# Gemini key, etc) are NOT secret-mounted any more — admin enters
# them in the LiteLLM admin UI when adding a model row, and the
# proxy persists them encrypted with litellm-salt-key.
#
# See examples/secret.yaml and examples/externalsecret.yaml in the repo.
existingSecret: ""

# ─────────────────────────────────────────────────────────────
# Container images
# ─────────────────────────────────────────────────────────────
global:
  registry: docker.io/fireseeddev
  imagePullPolicy: IfNotPresent
  tag: ""  # defaults to .Chart.Version when empty
  imagePullSecrets: []

# ─────────────────────────────────────────────────────────────
# Pod placement
# ─────────────────────────────────────────────────────────────
# Applied uniformly to every platform pod (api, ui, operator, browser,
# litellm, redis, squid, bundled postgres + its backup CronJob).
#
# Example — pin everything to arm64 nodes:
#   nodeSelector:
#     kubernetes.io/arch: arm64
nodeSelector: {}
affinity: {}
tolerations: []

# ─────────────────────────────────────────────────────────────
# Postgres
# ─────────────────────────────────────────────────────────────
# By default, the chart provisions a bundled single-replica PostgreSQL
# StatefulSet. To point the platform at an external database (e.g. AWS RDS),
# set postgres.external.enabled=true and configure the connection below —
# the bundled StatefulSet, Service, and backup CronJob are then not rendered.
#
# Multi-tenant model is unchanged: the operator creates one database and one
# role per FireseedApp on whichever PostgreSQL is in use. The external master
# user must therefore have CREATEDB + CREATEROLE (the RDS master user does).
postgres:
  image: postgres:16
  user: fireseed
  database: fireseed
  storage: 5Gi
  port: 5432
  backup:
    enabled: true
    schedule: "0 */6 * * *"        # default: every 6 hours
    retainCount: 20                # keep last N backups
    storage: 2Gi                   # PVC size for the backup volume
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi
  external:
    enabled: false
    # Host and port of the external PostgreSQL (e.g. RDS writer endpoint).
    # Must be the primary writer — file-sync relies on LISTEN/NOTIFY, which
    # is not served from RDS read replicas.
    host: ""
    port: 5432
    user: fireseed
    database: fireseed
    # Password is read from the main existingSecret under the
    # postgres-password key (same as the bundled Postgres).
    # CIDR of the external database, used by the operator to emit an
    # ipBlock egress NetworkPolicy so app pods can reach it (the bundled
    # namespaceSelector-based rule doesn't apply to off-cluster hosts).
    # Example: "10.0.12.34/32" for a single RDS endpoint IP.
    cidr: ""

redis:
  # Image override; the chart pins a default in the template. Set
  # to a digest if you want a stable rebuild surface.
  image: redis:7-alpine
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# ─────────────────────────────────────────────────────────────
# Platform services
# ─────────────────────────────────────────────────────────────
api:
  replicas: 1
  port: 8000
  # POSTGRES_* connection details are derived from the postgres.* values
  # above (bundled or external) via the fireseed.postgres* helpers — no
  # need to duplicate them here.
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      # 2000m so a screenshot burst (17+ concurrent SELECTs + response
      # writes in one event loop) isn't throttled at the CPU ceiling.
      cpu: 2000m
      memory: 1Gi

ui:
  replicas: 1
  port: 3000
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

operator:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

litellm:
  replicas: 1
  port: 4000
  # The chart pulls BerriAI's official upstream image directly —
  # we don't rebuild a fork. Override here to pin a different tag
  # or to switch to a digest pin for supply-chain hardening, e.g.
  #   image: "ghcr.io/berriai/litellm-database:v1.83.10-stable@sha256:..."
  # Leave unset to use the chart default (a versioned stable tag).
  image: ""
  resources:
    requests:
      cpu: 100m
      memory: 1Gi
    limits:
      cpu: 1000m
      # The official litellm-database image holds ~1.5GB during prisma
      # migrate on first boot. 1Gi OOM-killed at 24s with no logs (exit
      # 137). Steady-state usage is closer to 600MB.
      memory: 2Gi
  # ─────────────────────────────────────────────────────────────
  # LiteLLM database + admin UI (optional)
  # ─────────────────────────────────────────────────────────────
  # When enabled, LiteLLM persists virtual keys, spend logs, audit
  # records, and any state created via the admin UI to a dedicated
  # `litellm` database in the platform Postgres. A post-install Helm
  # hook provisions the database and role idempotently. Disabled by
  # default so existing deployments don't break — to enable on an
  # already-running cluster, add the secret keys listed below to the
  # existingSecret and set `litellm.database.enabled=true`.
  #
  # Required secret keys when enabled:
  #   litellm-db-password   — password for the `litellm` postgres role
  #   litellm-salt-key      — used by LiteLLM to encrypt stored creds
  database:
    # On by default — every spend / virtual-key / SSO feature
    # depends on it. Can flip to false for an installs that
    # genuinely doesn't want LiteLLM-backed spend tracking, but
    # the platform's admin spend dashboard, per-project budgets,
    # SSO passport, and the LiteLLM admin UI all stop working.
    enabled: true
    connectionPoolLimit: 10
  # All models — Bedrock, OpenAI, Anthropic-direct, Gemini, Azure,
  # whatever — are admin-managed from the LiteLLM admin UI itself,
  # reachable via the SSO passport at /api/admin/litellm-passport
  # (linked from fireseed Settings → Manage models). The model row
  # + api_key persist in LiteLLM_ProxyModelTable (encrypted at rest
  # with litellm-salt-key) and survive helm upgrades. A fresh
  # cluster ships with no models — admin adds the first one via the
  # LiteLLM UI before the platform can serve a chat.
  ui:
    # Path prefix at which the LiteLLM admin UI is exposed on the
    # platform ingress. Empty disables the path-based ingress route
    # (and SERVER_ROOT_PATH on the deployment).
    pathPrefix: /litellm
    # Defense-in-depth: even though admins shouldn't ever need to
    # reach /litellm/ directly (the fireseed Models page covers
    # everything), keep the basic-auth gate so a curious user
    # walking the Tailscale tailnet hits a master-key login instead
    # of an open admin UI. Set to false to fully open it.
    requireBasicAuth: true

browser:
  replicas: 2
  port: 9222
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

squid:
  replicas: 1
  port: 3128
  # Initial host allowlist — seeded into AllowedHost rows on first
  # platform boot AND rendered into squid's allowed_hosts.txt at
  # chart install. Admins extend the list at runtime via Settings →
  # Hosts (the api PATCHes the configmap and rolls the squid pod);
  # extending here adds them on every fresh install + on every helm
  # upgrade that runs against an unseeded DB. After first boot the
  # api is authoritative — helm upgrades will NOT clobber a list the
  # admin extended via the UI (the configmap's data is overwritten
  # by helm but the AllowedHost rows persist; the next mutation
  # syncs the configmap back to match the DB).
  defaultHosts:
    - hostname: pypi.org
      description: Python Package Index
    - hostname: files.pythonhosted.org
      description: PyPI file downloads
    - hostname: registry.npmjs.org
      description: npm registry
    - hostname: cdn.jsdelivr.net
      description: jsDelivr CDN
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

# ─────────────────────────────────────────────────────────────
# Git sync (optional)
# ─────────────────────────────────────────────────────────────
# Mirrors every project's files to/from a single git repo. Modelled on
# ArgoCD — pure git operations, no provider-specific APIs. Works with
# GitHub, GitLab, Gitea, Bitbucket, or any HTTPS git host.
#
# Layout in the repo: projects/{subdomain}/<files as in the platform DB>
# Flow: LLM writes → DB → sync pod pushes to {branch}. Commits landing
# on {branch} (direct or merged PRs) → applied back to the DB, which
# triggers the normal file-sync sidecars.
#
# `enabled` here just controls whether the git-sync pod is deployed.
# The repo URL, branch, credentials, and a runtime enabled toggle live
# in the platform DB and are configured from the admin UI under
# "Git Sync". The pod fetches them on startup and refreshes every minute.
gitSync:
  enabled: false
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# ─────────────────────────────────────────────────────────────
# Ingress
# ─────────────────────────────────────────────────────────────
# App namespace where the operator provisions FireseedApp child
# resources. The shared operator routes per-app NetworkPolicies to
# whichever platform owns the namespace via the
# fireseed.dev/platform label. Demo overrides this to
# fireseed-demo-apps via its own chart.
appNamespace: fireseed-apps

ingress:
  enabled: true
  # Leave className empty to use the cluster's default IngressClass.
  className: ""
  # Host for the platform ingress. Leave empty for hostless ingresses
  # (e.g. when using the Tailscale operator's own hostname).
  host: ""
  tls: false
  tlsSecretName: ""
  # Extra hosts for the tls.hosts list. The Tailscale operator reads
  # the desired node hostname from tls[0].hosts[0].
  tlsHosts: []
  annotations: {}
